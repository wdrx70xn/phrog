name: debian-unstable
'on':
  workflow_call:
    inputs:
      release_mode:
        description: Release mode from orchestrator
        required: false
        type: string
        default: none
  push:
    branches:
    - main
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - labeled
  workflow_dispatch: null
concurrency:
  group: debian-unstable-${{ github.ref }}-${{ inputs.release_mode || 'none' }}
  cancel-in-progress: true
jobs:
  build:
    if: inputs.release_mode == 'pr' || inputs.release_mode == 'tag' || github.event_name
      != 'pull_request' || (contains(github.event.pull_request.labels.*.name, 'debs')
      && !startsWith(github.event.pull_request.head.ref || '', 'release/v'))
    name: Build unstable .debs
    runs-on: ${{ matrix.runner }}
    container: debian:unstable
    strategy:
      matrix:
        include:
        - arch: amd64
          runner: ubuntu-24.04
        - arch: arm64
          runner: ubuntu-latest
    env:
      DEB_BUILD_OPTIONS: nocheck
      DEB_BUILD_PROFILES: nocheck
    steps:
    - name: install deps
      run: "apt-get update\napt-get -y --no-install-recommends install \\\n  build-essential\
        \ \\\n  ca-certificates \\\n  devscripts \\\n  dpkg-dev \\\n  eatmydata \\\
        \n  equivs \\\n  fakeroot \\\n  git \\\n  git-buildpackage\n"
    - uses: actions/checkout@v4
    - name: Install build-deps
      run: "set -euo pipefail\neatmydata apt-get -y --no-install-recommends \\\n \
        \ build-dep .\n"
    - name: Build packages
      run: 'set -euxo pipefail

        dpkg-buildpackage -us -uc -b

        mkdir -p debs

        mv ../*.deb ${GITHUB_WORKSPACE}/debs

        '
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: debs-${{ matrix.arch }}
        path: debs
